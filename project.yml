name: Plozz
options:
  bundleIdPrefix: com.thatcube
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: N8Z5T4AK3X
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "3" # Apple TV
    SWIFT_STRICT_CONCURRENCY: complete

# Local Swift package providing all modular feature/code libraries.
packages:
  Plozz:
    path: .

targets:
  Plozz:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: App/Plozz
      - path: App/Resources/Assets.xcassets
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Local network access is required for LAN server discovery on tvOS.
        NSLocalNetworkUsageDescription: "Plozz uses your local network to discover Jellyfin servers automatically."
        NSBonjourServices:
          - _jellyfin._tcp
        # Jellyfin servers are often plain HTTP on the LAN. Allow local networking.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Plozz
        PRODUCT_NAME: Plozz
        # Build number (CFBundleVersion). The fastlane `build` lane overrides
        # this with (latest TestFlight build + 1) at archive time; this default
        # keeps plain xcodebuild / local device installs working.
        CURRENT_PROJECT_VERSION: 1
        # tvOS "Brand Assets" providing the layered app icon and Top Shelf
        # images (required by App Store Connect for any upload, incl. TestFlight).
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: Plozz
        product: AppShell

schemes:
  Plozz:
    build:
      targets:
        Plozz: all
    run:
      config: Debug
    test:
      config: Debug
      # Unit tests live in the Swift package; run them via the package scheme
      # (`swift test` / `xcodebuild test -scheme Plozz-Package`).
