name: Plozz
options:
  bundleIdPrefix: com.thatcube
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: N8Z5T4AK3X
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "3" # Apple TV
    SWIFT_STRICT_CONCURRENCY: complete
    # Build number (CFBundleVersion) fallback. tools/generate-project.sh bakes the
    # real value into the generated project on every regenerate — from the git
    # commit count (local/device/simulator builds) or PLOZZ_BUILD_NUMBER (the
    # fastlane `build` lane passes latest TestFlight build + 1). This literal only
    # survives if the project is generated with a bare `xcodegen generate`.
    CURRENT_PROJECT_VERSION: 1
    # Marketing version (CFBundleShortVersionString). Defined once here so the app
    # and the Top Shelf extension share the same value (the extension's
    # CFBundleShortVersionString must match the parent app's). Bump by hand for a
    # real release.
    MARKETING_VERSION: "0.1"

# Local Swift package providing all modular feature/code libraries.
packages:
  Plozz:
    path: .
  Inject:
    url: https://github.com/krzysztofzablocki/Inject
    from: "1.5.2"

targets:
  Plozz:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: App/Plozz
      - path: App/Resources/Assets.xcassets
      - path: App/Resources/Fonts
    info:
      path: App/Resources/Info.plist
      properties:
        # Marketing version (CFBundleShortVersionString) comes from the shared
        # MARKETING_VERSION build setting so the app and Top Shelf extension match.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Background audio keeps music playing while the user browses other
        # screens or the tvOS screensaver starts. Required for the music MVP's
        # background/Now-Playing behaviour (AVAudioSession .playback).
        UIBackgroundModes:
          - audio
        UIAppFonts:
          - "Bungee-Regular.ttf"
        # OMDb API key for external ratings enrichment (IMDb/RT/Metacritic).
        # Substituted from the OMDB_API_KEY build setting (see Config/Secrets.xcconfig
        # → optional, gitignored Config/Secrets.local.xcconfig). Empty by default,
        # which disables OMDb enrichment and shows only Jellyfin-native ratings.
        OMDBAPIKey: "$(OMDB_API_KEY)"
        # TMDb API Read Access Token (v4 bearer). Powers the canonical-poster
        # fallback for items whose provider artwork is missing or junk. Substituted
        # from the TMDB_BEARER_TOKEN build setting (gitignored Config/Secrets.local.xcconfig).
        # Empty by default, which disables the TMDb fallback.
        TMDBBearerToken: "$(TMDB_BEARER_TOKEN)"
        # Optional base URL of a self-hostable TMDb caching proxy that holds ONE
        # TMDb key server-side (TMDb terms forbid shipping a key in an open-source
        # client). When set, TMDb-grade movie/western-TV backdrops, logos and
        # episode stills are served compliantly and scalably for any number of
        # users. Empty by default: the app then relies on the keyless providers
        # (AniList/Kitsu/TVmaze/Deezer/MusicBrainz) and the user's own server art.
        TMDBProxyBaseURL: "$(TMDB_PROXY_BASE_URL)"
        # Trakt OAuth application credentials, powering per-profile watch-history
        # sync (scrobbling). Substituted from the TRAKT_CLIENT_ID /
        # TRAKT_CLIENT_SECRET build settings (gitignored
        # Config/Secrets.local.xcconfig). Empty by default, which disables Trakt
        # sync (the Settings panel shows it as unavailable and scrobbling is a
        # no-op). Create an app at https://trakt.tv/oauth/applications to get these.
        TraktClientID: "$(TRAKT_CLIENT_ID)"
        TraktClientSecret: "$(TRAKT_CLIENT_SECRET)"
        # MyAnimeList client ID for anime tracking (device-code OAuth). Substituted
        # from MAL_CLIENT_ID build setting (gitignored Config/Secrets.local.xcconfig).
        # Empty by default, which disables MAL sync.
        MALClientID: "$(MAL_CLIENT_ID)"
        # Simkl client credentials for watch tracking. Register at simkl.com/apps.
        SimklClientID: "$(SIMKL_CLIENT_ID)"
        SimklClientSecret: "$(SIMKL_CLIENT_SECRET)"
        # AniList client ID/secret for anime tracking (authorization code grant).
        AniListClientID: "$(ANILIST_CLIENT_ID)"
        AniListClientSecret: "$(ANILIST_CLIENT_SECRET)"
        # Local network access is required for LAN server discovery on tvOS.
        NSLocalNetworkUsageDescription: "Plozz uses your local network to discover Jellyfin servers automatically."
        NSBonjourServices:
          - _jellyfin._tcp
        # Jellyfin servers are user-controlled and frequently plain HTTP — on the
        # LAN, behind a reverse proxy, or over Tailscale (the 100.64.0.0/10 CGNAT
        # range, which is NOT covered by NSAllowsLocalNetworking). Since the user
        # explicitly enters their own server address, allow arbitrary HTTP loads
        # so Tailscale IPs (http://100.x.x.x:8096) and MagicDNS names resolve.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        # Deep links that launch the app straight into playback, used by the
        # Top Shelf extension's cards (e.g. plozz://item/<id>).
        CFBundleURLTypes:
          - CFBundleURLName: com.thatcube.Plozz.deeplink
            CFBundleURLSchemes:
              - plozz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Plozz
        PRODUCT_NAME: Plozz
        # Default (empty) OMDb API key so plain builds work with external-ratings
        # enrichment disabled. A real key is supplied via the gitignored
        # Config/Secrets.local.xcconfig (see Config/Secrets.xcconfig).
        OMDB_API_KEY: ""
        # Default (empty) TMDb proxy base URL. A maintainer-run/self-hosted proxy
        # URL can be supplied via the gitignored Config/Secrets.local.xcconfig.
        TMDB_PROXY_BASE_URL: ""
        # tvOS "Brand Assets" providing the layered app icon and Top Shelf
        # images (required by App Store Connect for any upload, incl. TestFlight).
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        # App Group entitlement shared with the Top Shelf extension so both can
        # exchange the published snapshot.
        CODE_SIGN_ENTITLEMENTS: App/Resources/Plozz.entitlements
        GENERATE_INFOPLIST_FILE: NO
        # Force-keep the AVKit load command. AVKit is only used via the dynamic
        # `UIWindow.avDisplayManager` ObjC category (for the Dolby Vision / HDR
        # display-mode switch), so the linker's default `-dead_strip_dylibs`
        # otherwise drops it and the selector is unrecognized at runtime (crash).
        OTHER_LDFLAGS: "-Wl,-needed_framework,AVKit"
      configs:
        # `-interposable` lets InjectionNext swap function bodies at runtime for
        # live UI hot-reload. Debug only — never ship it in Release.
        Debug:
          OTHER_LDFLAGS: "-Wl,-needed_framework,AVKit -Xlinker -interposable"
          # InjectionNext (Cursor/VS Code, no-Xcode mode) parses build logs to
          # learn how to recompile a saved file; Xcode 16.3+ needs this to keep
          # emitting the frontend command lines it reads.
          EMIT_FRONTEND_COMMAND_LINES: YES
          # InjectionNext recompiles ONE saved file; whole-module mode breaks that.
          SWIFT_COMPILATION_MODE: incremental
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          # copy_bundle.sh (below) writes + codesigns the on-device injection
          # bundle into the .app, which the script sandbox blocks.
          ENABLE_USER_SCRIPT_SANDBOXING: NO
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: Plozz
        product: AppShell
      - package: Inject
      - target: PlozzTopShelf
        embed: true
    postBuildScripts:
      # On-device InjectionNext hot-reload: copy the prebuilt tvOS device
      # injection bundle into the .app and codesign it so the running app can
      # connect back to the InjectionNext server. The script self-gates to Debug
      # (Release/TestFlight builds skip it), so this never ships.
      - script: |
          RESOURCES="/Applications/InjectionNext.app/Contents/Resources"
          if [ -f "$RESOURCES/copy_bundle.sh" ]; then
            "$RESOURCES/copy_bundle.sh"
          fi
        name: "InjectionNext: copy device bundle (Debug only)"

  PlozzTopShelf:
    type: com.apple.product-type.tv-app-extension
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: TopShelf/ContentProvider.swift
      # The snapshot model + store are compiled into the extension directly so
      # it stays free of CoreModels and the rest of the app's stack.
      - path: Sources/TopShelfKit/TopShelfSnapshot.swift
      - path: Sources/TopShelfKit/TopShelfStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Plozz.TopShelf
        PRODUCT_NAME: PlozzTopShelf
        INFOPLIST_FILE: TopShelf/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: TopShelf/TopShelf.entitlements
        # tvOS's legacy TVExtensionMain entry point (set by the
        # com.apple.product-type.tv-app-extension product type) is a no-op stub
        # in modern tvOS — it returns immediately without instantiating the
        # principal class, leaving the Top Shelf empty. Modern Top Shelf
        # extensions must enter through NSExtensionMain (provided by
        # Foundation), which sets up the ExtensionKit/XPC runtime and
        # instantiates ContentProvider.
        LD_ENTRY_POINT: _NSExtensionMain

  # COMPILE/LINK gate target. This tvOS framework links the EngineMPV package
  # product on its own so CI / the build gate can prove it compiles + links
  # against the tvOS SDK with its libmpv + FFmpeg xcframeworks, independent of
  # the full app. (EngineMPV is also linked into the Plozz app itself as the sole
  # on-device decode engine; VLCKit was removed — see tag archive/vlckit-engine.)
  # Build via the EngineMPVProbe scheme.
  EngineMPVProbe:
    type: framework
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: App/EngineMPVProbe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Plozz.EngineMPVProbe
        PRODUCT_NAME: EngineMPVProbe
        GENERATE_INFOPLIST_FILE: YES
        # Probe-only; never shipped, so skip code signing entirely.
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - package: Plozz
        product: EngineMPV

  # COMPILE/LINK gate target for the local-remux engine. This tvOS framework
  # links the LocalRemux package product (and through it CRemuxCore + the FFmpeg
  # xcframeworks) on its own so CI / the build gate can prove the Infuse-style
  # localhost remux origin compiles + links against the tvOS SDK independent of
  # the full app. LocalRemux is also linked into the shipping app via AppShell.
  # Build via the LocalRemuxProbe scheme.
  LocalRemuxProbe:
    type: framework
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: App/LocalRemuxProbe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Plozz.LocalRemuxProbe
        PRODUCT_NAME: LocalRemuxProbe
        GENERATE_INFOPLIST_FILE: YES
        # Probe-only; never shipped, so skip code signing entirely.
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - package: Plozz
        product: LocalRemux

schemes:
  Plozz:
    build:
      targets:
        Plozz: all
      preActions:
        - script: |
            # Auto-link local secrets if missing (worktrees don't inherit gitignored files).
            SECRETS_FILE="${PROJECT_DIR}/Config/Secrets.local.xcconfig"
            CANONICAL="$HOME/.config/plozz/Secrets.local.xcconfig"
            if [ ! -e "$SECRETS_FILE" ] && [ -f "$CANONICAL" ]; then
              ln -s "$CANONICAL" "$SECRETS_FILE"
            fi
          name: Link secrets from ~/.config/plozz
          settingsTarget: Plozz
    run:
      config: Debug
    test:
      config: Debug
      # Unit tests live in the Swift package. Run them via the auto-generated
      # per-module *Tests schemes that Xcode publishes for the local package
      # (e.g. CoreModelsTests, ProviderJellyfinTests). `tools/run-tests.sh`
      # wraps `xcodebuild test ... -destination 'platform=tvOS Simulator,...'`
      # for the full set. `swift test` is unusable on macOS because the mpv
      # xcframeworks are tvOS-only.

  # Compile-only gate for the otherwise-unlinked EngineMPV module.
  EngineMPVProbe:
    build:
      targets:
        EngineMPVProbe: all
    run:
      config: Debug

  # Compile/link gate for the LocalRemux localhost remux engine.
  LocalRemuxProbe:
    build:
      targets:
        LocalRemuxProbe: all
    run:
      config: Debug
