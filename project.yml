name: Plozz
options:
  bundleIdPrefix: com.plozz
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    # MARKETING_VERSION is the human-facing semver (CFBundleShortVersionString);
    # bump it by hand for a release. CURRENT_PROJECT_VERSION is a placeholder —
    # the real CFBundleVersion is stamped from the git commit count by the
    # target's postBuildScript so it auto-increments on every commit.
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: N8Z5T4AK3X
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "3" # Apple TV
    SWIFT_STRICT_CONCURRENCY: complete

# Local Swift package providing all modular feature/code libraries.
packages:
  Plozz:
    path: .

targets:
  Plozz:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: App/Plozz
      - path: App/Resources/Assets.xcassets
    info:
      path: App/Resources/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Local network access is required for LAN server discovery on tvOS.
        NSLocalNetworkUsageDescription: "Plozz uses your local network to discover Jellyfin servers automatically."
        NSBonjourServices:
          - _jellyfin._tcp
        # Jellyfin servers are often plain HTTP on the LAN. Allow local networking.
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        # Deep links that launch the app straight into playback, used by the
        # Top Shelf extension's cards (e.g. plozz://item/<id>).
        CFBundleURLTypes:
          - CFBundleURLName: com.plozz.app.deeplink
            CFBundleURLSchemes:
              - plozz
    postBuildScripts:
      - name: Set build number from git commit count
        basedOnDependencyAnalysis: false
        script: |
          # Derive an auto-incrementing build number from the git history so
          # CFBundleVersion revises on every commit without manual edits. Runs
          # after the build but before code signing so the patched Info.plist
          # stays validly signed.
          set -e
          buildNumber=$(git -C "$SRCROOT" rev-list --count HEAD 2>/dev/null || echo 1)
          plist="${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          if [ -f "$plist" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $buildNumber" "$plist"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.plozz.app
        PRODUCT_NAME: Plozz
        # Layered tvOS "Brand Assets" app icon (generated by
        # tools/generate_brand_assets.py from the Plozz logo).
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # App Group entitlement shared with the Top Shelf extension so both can
        # exchange the published snapshot.
        CODE_SIGN_ENTITLEMENTS: App/Resources/Plozz.entitlements
        GENERATE_INFOPLIST_FILE: NO
    dependencies:
      - package: Plozz
        product: AppShell
      - target: PlozzTopShelf
        embed: true

  PlozzTopShelf:
    type: com.apple.product-type.tv-app-extension
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: TopShelf/ContentProvider.swift
      # The snapshot model + store are compiled into the extension directly so
      # it stays free of CoreModels and the rest of the app's stack.
      - path: Sources/TopShelfKit/TopShelfSnapshot.swift
      - path: Sources/TopShelfKit/TopShelfStore.swift
    postBuildScripts:
      - name: Set build number from git commit count
        basedOnDependencyAnalysis: false
        script: |
          # Keep the extension's CFBundleVersion in lockstep with the app's.
          # tvOS refuses to load an app extension whose CFBundleVersion does
          # not match its containing app, which leaves the Top Shelf empty.
          set -e
          buildNumber=$(git -C "$SRCROOT" rev-list --count HEAD 2>/dev/null || echo 1)
          plist="${BUILT_PRODUCTS_DIR}/${INFOPLIST_PATH}"
          if [ -f "$plist" ]; then
            /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $buildNumber" "$plist"
          fi
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.plozz.app.TopShelf
        PRODUCT_NAME: PlozzTopShelf
        INFOPLIST_FILE: TopShelf/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: TopShelf/TopShelf.entitlements
        # tvOS's legacy TVExtensionMain entry point (set by the
        # com.apple.product-type.tv-app-extension product type) is a no-op stub
        # in modern tvOS — it returns immediately without instantiating the
        # principal class, leaving the Top Shelf empty. Modern Top Shelf
        # extensions must enter through NSExtensionMain (provided by
        # Foundation), which sets up the ExtensionKit/XPC runtime and
        # instantiates ContentProvider.
        LD_ENTRY_POINT: _NSExtensionMain

schemes:
  Plozz:
    build:
      targets:
        Plozz: all
    run:
      config: Debug
    test:
      config: Debug
      # Unit tests live in the Swift package; run them via the package scheme
      # (`swift test` / `xcodebuild test -scheme Plozz-Package`).
