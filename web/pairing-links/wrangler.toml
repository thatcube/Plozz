name = "plozz-pairing-links"
main = "src/worker.js"
compatibility_date = "2024-11-01"
workers_dev = false

# Narrow routes ONLY. Everything else on plozz.app continues to be served by the
# existing `plozz-website` Cloudflare Pages project — Worker routes take priority
# over Pages for just these two paths, so the rest of the site is untouched.
routes = [
  { pattern = "plozz.app/.well-known/apple-app-site-association", zone_name = "plozz.app" },
  { pattern = "plozz.app/pair", zone_name = "plozz.app" },
]
