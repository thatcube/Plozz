name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and test tvOS app
    runs-on: macos-15
    env:
      GIT_CONFIG_PARAMETERS: "'safe.bareRepository=all'"
    steps:
      - uses: actions/checkout@v5

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.2.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: tools/generate-project.sh

      - name: Build (tvOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Plozz.xcodeproj \
            -scheme Plozz \
            -destination 'generic/platform=tvOS Simulator' \
            ARCHS=arm64 \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGNING_ALLOWED=NO

      - name: Run full test matrix (tvOS Simulator, build-once)
        run: tools/run-tests.sh
