name: Plozz
options:
  bundleIdPrefix: com.thatcube
  deploymentTarget:
    iOS: "18.0"
    tvOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: N8Z5T4AK3X
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "3" # Apple TV
    SWIFT_STRICT_CONCURRENCY: complete
    # Build number (CFBundleVersion) fallback. tools/generate-project.sh bakes the
    # real value into the generated project on every regenerate — from the git
    # commit count (local/device/simulator builds) or PLOZZ_BUILD_NUMBER (the
    # fastlane `build` lane passes latest TestFlight build + 1). This literal only
    # survives if the project is generated with a bare `xcodegen generate`.
    CURRENT_PROJECT_VERSION: 1
    # Marketing version (CFBundleShortVersionString) fallback. Defined once here so
    # the app and Top Shelf extension share the same value (the extension's
    # CFBundleShortVersionString must match the parent app's). tools/generate-project.sh
    # bakes the real value on every regenerate — a CalVer build date (YYYY.M.D) by
    # default, or PLOZZ_MARKETING_VERSION when you want a hand-chosen release name
    # (e.g. "1.0"). This literal only survives a bare `xcodegen generate`.
    MARKETING_VERSION: "0.1"
    # Opt-in crash reporting endpoint (Sentry DSN). Empty by default so the app
    # is a true no-op unless a real DSN is provided. tools/generate-project.sh
    # bakes the value of the PLOZZ_SENTRY_DSN env var into the generated project
    # when set (mirrors the CURRENT_PROJECT_VERSION bake). Kept OUT of git — the
    # DSN is supplied via the untracked .env.fastlane / environment, never here.
    PLOZZ_SENTRY_DSN: ""

# Local Swift package providing all modular feature/code libraries.
packages:
  Plozz:
    path: .

targets:
  Plozz:
    type: application
    platform: tvOS
    deploymentTarget: "18.0"
    sources:
      - path: App/Plozz
      - path: App/Resources/Assets.xcassets
      - path: App/Resources/Fonts
    info:
      path: App/Resources/Info.plist
      properties:
        # Home-screen name. Empty ${PLOZZ_NAME_SUFFIX} → "Plozz" (canonical); an
        # opt-in per-branch build sets it to " <slug>" so the separate app reads
        # "Plozz <slug>" and is distinguishable on the Apple TV home screen.
        CFBundleDisplayName: Plozz${PLOZZ_NAME_SUFFIX}
        # Marketing version (CFBundleShortVersionString) comes from the shared
        # MARKETING_VERSION build setting so the app and Top Shelf extension match.
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Export-compliance answer, baked in so App Store Connect never shows
        # "Missing Compliance" and external TestFlight distribution isn't blocked.
        # Plozz only uses standard/exempt encryption (HTTPS/TLS, SMB) and no
        # custom cryptography, so it qualifies for the exemption (value NO).
        ITSAppUsesNonExemptEncryption: false
        # Opt-in crash-reporting DSN, read at runtime by CrashReporting. Resolves
        # from the PLOZZ_SENTRY_DSN build setting (empty unless baked in), so
        # builds without a DSN never send anything.
        PlozzSentryDSN: "$(PLOZZ_SENTRY_DSN)"
        # Background audio keeps music playing while the user browses other
        # screens or the tvOS screensaver starts. Required for the music MVP's
        # background/Now-Playing behaviour (AVAudioSession .playback).
        # remote-notification lets CloudKit (CKSyncEngine) wake the app to pull
        # config changes pushed from another device on the same Apple ID.
        UIBackgroundModes:
          - audio
          - remote-notification
        UIAppFonts:
          - "Bungee-Regular.ttf"
          # Atkinson Hyperlegible (SIL OFL) — the default subtitle font. Designed
          # by the Braille Institute for maximum legibility and character
          # disambiguation (I/l/1, 0/O), which is exactly what 10-foot captions
          # need. Latin-only; the renderer cascades to the tvOS system CJK fonts
          # (Hiragino / PingFang / Apple SD Gothic Neo) for mixed-language lines.
          # License: App/Resources/Fonts/OFL.txt.
          - "AtkinsonHyperlegible-Regular.ttf"
          - "AtkinsonHyperlegible-Italic.ttf"
          - "AtkinsonHyperlegible-Bold.ttf"
          - "AtkinsonHyperlegible-BoldItalic.ttf"
          # Additional subtitle faces, all open-license and bundled like Atkinson.
          # Lexend (OFL) — tuned for reading speed/comprehension; upright weights
          # Regular/Medium/SemiBold/Bold (instanced from the variable font), no
          # italics, so the renderer degrades italics to upright.
          # License: App/Resources/Fonts/OFL-Lexend.txt.
          - "Lexend-Regular.ttf"
          - "Lexend-Medium.ttf"
          - "Lexend-SemiBold.ttf"
          - "Lexend-Bold.ttf"
          # Roboto (OFL) — the neutral, familiar sans used by Android/YouTube
          # captions; upright Regular/Medium/SemiBold/Bold plus Italic/BoldItalic.
          # License: App/Resources/Fonts/OFL-Roboto.txt.
          - "Roboto-Regular.ttf"
          - "Roboto-Medium.ttf"
          - "Roboto-SemiBold.ttf"
          - "Roboto-Italic.ttf"
          - "Roboto-Bold.ttf"
          - "Roboto-BoldItalic.ttf"
          # Fredoka (OFL) — a rounded, chunky, playful display sans; upright
          # Regular/Medium/SemiBold/Bold (instanced from the variable font), no
          # italics. License: App/Resources/Fonts/OFL-Fredoka.txt.
          - "Fredoka-Regular.ttf"
          - "Fredoka-Medium.ttf"
          - "Fredoka-SemiBold.ttf"
          - "Fredoka-Bold.ttf"
          # OpenDyslexic (OFL) — weighted-bottom letterforms that aid readers with
          # dyslexia; full Regular/Bold/Italic/BoldItalic set (OTF).
          # License: App/Resources/Fonts/OFL-OpenDyslexic.txt.
          - "OpenDyslexic-Regular.otf"
          - "OpenDyslexic-Italic.otf"
          - "OpenDyslexic-Bold.otf"
          - "OpenDyslexic-BoldItalic.otf"
        # OMDb API key for external ratings enrichment (IMDb/RT/Metacritic).
        # Substituted from the OMDB_API_KEY build setting (see Config/Secrets.xcconfig
        # → optional, gitignored Config/Secrets.local.xcconfig). Empty by default,
        # which disables OMDb enrichment and shows only Jellyfin-native ratings.
        OMDBAPIKey: "$(OMDB_API_KEY)"
        # TMDb API Read Access Token (v4 bearer). Powers the canonical-poster
        # fallback for items whose provider artwork is missing or junk. Substituted
        # from the TMDB_BEARER_TOKEN build setting (gitignored Config/Secrets.local.xcconfig).
        # Empty by default, which disables the TMDb fallback.
        TMDBBearerToken: "$(TMDB_BEARER_TOKEN)"
        # Optional base URL of a self-hostable TMDb caching proxy that holds ONE
        # TMDb key server-side (TMDb terms forbid shipping a key in an open-source
        # client). When set, TMDb-grade movie/western-TV backdrops, logos and
        # episode stills are served compliantly and scalably for any number of
        # users. Empty by default: the app then relies on the keyless providers
        # (AniList/Kitsu/TVmaze/Deezer/MusicBrainz) and the user's own server art.
        TMDBProxyBaseURL: "$(TMDB_PROXY_BASE_URL)"
        # TheTVDB v4 API key — the BUNDLED, always-included keyed metadata/artwork
        # provider (the keyless base's primary keyed layer). Substituted from the
        # TVDB_API_KEY build setting (gitignored Config/Secrets.local.xcconfig,
        # symlinked from the canonical secrets file). TheTVDB licenses by parent-
        # company revenue (free under $50k/yr, FOSS-friendly) — an objective test
        # with no "commercial-use" gray area — so it ships in every build. Empty by
        # default (e.g. a contributor without the key), which disables the TVDB tier
        # and leaves the keyless providers powering enrichment. Attribution required.
        TVDBAPIKey: "$(TVDB_API_KEY)"
        # Trakt OAuth application credentials, powering per-profile watch-history
        # sync (scrobbling). Substituted from the TRAKT_CLIENT_ID /
        # TRAKT_CLIENT_SECRET build settings (gitignored
        # Config/Secrets.local.xcconfig). Empty by default, which disables Trakt
        # sync (the Settings panel shows it as unavailable and scrobbling is a
        # no-op). Create an app at https://trakt.tv/oauth/applications to get these.
        TraktClientID: "$(TRAKT_CLIENT_ID)"
        TraktClientSecret: "$(TRAKT_CLIENT_SECRET)"
        # MyAnimeList client ID for anime tracking (device-code OAuth). Substituted
        # from MAL_CLIENT_ID build setting (gitignored Config/Secrets.local.xcconfig).
        # Empty by default, which disables MAL sync.
        MALClientID: "$(MAL_CLIENT_ID)"
        OMDBAPIKey: "$(OMDB_API_KEY)"
        TMDBBearerToken: "$(TMDB_BEARER_TOKEN)"
        # Simkl client credentials for watch tracking. Register at simkl.com/apps.
        SimklClientID: "$(SIMKL_CLIENT_ID)"
        SimklClientSecret: "$(SIMKL_CLIENT_SECRET)"
        # AniList client ID/secret for anime tracking (authorization code grant).
        AniListClientID: "$(ANILIST_CLIENT_ID)"
        AniListClientSecret: "$(ANILIST_CLIENT_SECRET)"
        # Last.fm music scrobbling. The API key + shared secret sign every call
        # on-device (like Trakt/Simkl above, whose secrets also ship here) so the
        # TV can run the no-typing desktop-auth poll flow. Substituted from
        # LASTFM_API_KEY / LASTFM_SHARED_SECRET (gitignored
        # Config/Secrets.local.xcconfig). Empty by default, which disables
        # scrobbling (Settings shows Last.fm as unavailable). Register at
        # https://www.last.fm/api/account/create to get these.
        LastFmAPIKey: "$(LASTFM_API_KEY)"
        LastFmSharedSecret: "$(LASTFM_SHARED_SECRET)"
        # Local network access is required for LAN server discovery on tvOS.
        NSLocalNetworkUsageDescription: "Plozz uses your local network to discover Jellyfin and Emby servers and media shares automatically."
        NSBonjourServices:
          - _jellyfin._tcp
          # SMB file servers (NAS, macOS/Windows file sharing) advertise
          # themselves as _smb._tcp; used to auto-discover local media shares.
          - _smb._tcp
          # Sync & Setup device pairing ("set up from another device"): the TV
          # advertises this service so a configured phone/tablet can find it and
          # transfer setup over the local network.
          - _plozz-pair._tcp
        # Jellyfin servers are user-controlled and frequently plain HTTP — on the
        # LAN, behind a reverse proxy, or over Tailscale (the 100.64.0.0/10 CGNAT
        # range, which is NOT covered by NSAllowsLocalNetworking). Since the user
        # explicitly enters their own server address, allow arbitrary HTTP loads
        # so Tailscale IPs (http://100.x.x.x:8096) and MagicDNS names resolve.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        # Deep links that launch the app straight into playback, used by the
        # Top Shelf extension's cards (e.g. plozz://item/<id>).
        CFBundleURLTypes:
          - CFBundleURLName: com.thatcube.Plozz.deeplink
            CFBundleURLSchemes:
              - plozz
    settings:
      base:
        # ${PLOZZ_ID_SUFFIX} is EMPTY for a normal (canonical) build → the real
        # `com.thatcube.Plozz`. An opt-in per-branch build (tools/deploy-*.sh
        # --branded) sets it to ".<slug>" so that branch installs a SEPARATE app
        # (`com.thatcube.Plozz.<slug>`) side-by-side, never touching the canonical.
        # generate-project.sh always exports a default so the token expands cleanly.
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Plozz${PLOZZ_ID_SUFFIX}
        PRODUCT_NAME: Plozz
        # Default (empty) OMDb API key so plain builds work with external-ratings
        # enrichment disabled. A real key is supplied via the gitignored
        # Config/Secrets.local.xcconfig (see Config/Secrets.xcconfig).
        OMDB_API_KEY: ""
        # Default (empty) TMDb proxy base URL. A maintainer-run/self-hosted proxy
        # URL can be supplied via the gitignored Config/Secrets.local.xcconfig.
        TMDB_PROXY_BASE_URL: ""
        # tvOS "Brand Assets" providing the layered app icon and Top Shelf
        # images (required by App Store Connect for any upload, incl. TestFlight).
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        # App Group entitlement shared with the Top Shelf extension so both can
        # exchange the published snapshot.
        # Canonical uses the full entitlements; a --branded per-branch build swaps
        # in the stripped variant (empty ${PLOZZ_TV_APP_ENTITLEMENTS} default keeps
        # canonical). See tools/deploy-tv.sh --branded.
        CODE_SIGN_ENTITLEMENTS: ${PLOZZ_TV_APP_ENTITLEMENTS}
        GENERATE_INFOPLIST_FILE: NO
        # Force-keep the AVKit load command. AVKit is only used via the dynamic
        # `UIWindow.avDisplayManager` ObjC category (for the Dolby Vision / HDR
        # display-mode switch), so the linker's default `-dead_strip_dylibs`
        # otherwise drops it and the selector is unrecognized at runtime (crash).
        OTHER_LDFLAGS: "-Wl,-needed_framework,AVKit"
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: Plozz
        product: AppShell
      - target: PlozzTopShelf
        embed: true

  PlozzTopShelf:
    type: com.apple.product-type.tv-app-extension
    platform: tvOS
    deploymentTarget: "18.0"
    sources:
      - path: TopShelf/ContentProvider.swift
      # The snapshot model + store are compiled into the extension directly so
      # it stays free of CoreModels and the rest of the app's stack.
      - path: Sources/TopShelfKit/TopShelfSnapshot.swift
      - path: Sources/TopShelfKit/TopShelfStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Plozz${PLOZZ_ID_SUFFIX}.TopShelf
        PRODUCT_NAME: PlozzTopShelf
        INFOPLIST_FILE: TopShelf/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: ${PLOZZ_TV_TOPSHELF_ENTITLEMENTS}
        # tvOS's legacy TVExtensionMain entry point (set by the
        # com.apple.product-type.tv-app-extension product type) is a no-op stub
        # in modern tvOS — it returns immediately without instantiating the
        # principal class, leaving the Top Shelf empty. Modern Top Shelf
        # extensions must enter through NSExtensionMain (provided by
        # Foundation), which sets up the ExtensionKit/XPC runtime and
        # instantiates ContentProvider.
        LD_ENTRY_POINT: _NSExtensionMain

  PlozziOS:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: App/PlozziOS
      - path: App/Resources/Fonts
    info:
      path: App/PlozziOS/Info.plist
      properties:
        CFBundleDisplayName: Plozz${PLOZZ_NAME_SUFFIX}
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        PlozzSentryDSN: "$(PLOZZ_SENTRY_DSN)"
        UILaunchScreen: {}
        UIRequiresFullScreen: false
        # remote-notification lets CloudKit (CKSyncEngine) wake the app to pull
        # config changes pushed from another device on the same Apple ID.
        UIBackgroundModes:
          - remote-notification
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts:
          - "Bungee-Regular.ttf"
          - "AtkinsonHyperlegible-Regular.ttf"
          - "AtkinsonHyperlegible-Italic.ttf"
          - "AtkinsonHyperlegible-Bold.ttf"
          - "AtkinsonHyperlegible-BoldItalic.ttf"
          - "Lexend-Regular.ttf"
          - "Lexend-Medium.ttf"
          - "Lexend-SemiBold.ttf"
          - "Lexend-Bold.ttf"
          - "Roboto-Regular.ttf"
          - "Roboto-Medium.ttf"
          - "Roboto-SemiBold.ttf"
          - "Roboto-Italic.ttf"
          - "Roboto-Bold.ttf"
          - "Roboto-BoldItalic.ttf"
          - "Fredoka-Regular.ttf"
          - "Fredoka-Medium.ttf"
          - "Fredoka-SemiBold.ttf"
          - "Fredoka-Bold.ttf"
          - "OpenDyslexic-Regular.otf"
          - "OpenDyslexic-Italic.otf"
          - "OpenDyslexic-Bold.otf"
          - "OpenDyslexic-BoldItalic.otf"
        NSLocalNetworkUsageDescription: "Plozz uses your local network to discover media servers and network shares."
        NSBonjourServices:
          - _jellyfin._tcp
          - _smb._tcp
          # Sync & Setup device pairing ("set up another device") over the LAN.
          - _plozz-pair._tcp
        NSCameraUsageDescription: "Plozz uses the camera to scan the setup code shown on your other device."
        OMDBAPIKey: "$(OMDB_API_KEY)"
        TMDBBearerToken: "$(TMDB_BEARER_TOKEN)"
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        CFBundleURLTypes:
          - CFBundleURLName: com.thatcube.Plozz.deeplink
            CFBundleURLSchemes:
              - plozz
        TraktClientID: "$(TRAKT_CLIENT_ID)"
        TraktClientSecret: "$(TRAKT_CLIENT_SECRET)"
        SimklClientID: "$(SIMKL_CLIENT_ID)"
        SimklClientSecret: "$(SIMKL_CLIENT_SECRET)"
        AniListClientID: "$(ANILIST_CLIENT_ID)"
        AniListClientSecret: "$(ANILIST_CLIENT_SECRET)"
        MALClientID: "$(MAL_CLIENT_ID)"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Plozz${PLOZZ_ID_SUFFIX}
        PRODUCT_NAME: Plozz
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: App/PlozziOS/PlozziOS.entitlements
        GENERATE_INFOPLIST_FILE: NO
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: Plozz
        product: AppShelliOS

schemes:
  Plozz:
    build:
      targets:
        Plozz: all
      preActions:
        - script: |
            # Auto-link local secrets if missing (worktrees don't inherit gitignored files).
            SECRETS_FILE="${PROJECT_DIR}/Config/Secrets.local.xcconfig"
            CANONICAL="$HOME/.config/plozz/Secrets.local.xcconfig"
            if [ ! -e "$SECRETS_FILE" ] && [ -f "$CANONICAL" ]; then
              ln -s "$CANONICAL" "$SECRETS_FILE"
            fi
          name: Link secrets from ~/.config/plozz
          settingsTarget: Plozz
    run:
      config: Debug
    test:
      config: Debug
      # Unit tests live in the Swift package. Run them via the auto-generated
      # per-module *Tests schemes that Xcode publishes for the local package
      # (e.g. CoreModelsTests, ProviderJellyfinTests). `tools/run-tests.sh`
      # wraps `xcodebuild test ... -destination 'platform=tvOS Simulator,...'`
      # for the full set. `swift test` is unusable on macOS because
      # AetherEngine's FFmpeg xcframeworks are tvOS-only.
  PlozziOS:
    build:
      targets:
        PlozziOS: all
    run:
      config: Debug
