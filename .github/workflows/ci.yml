name: CI

on:
  push:
    branches: [ main ]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests (SwiftPM)
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      # On Linux, SwiftUI/AVKit/UIKit are unavailable, so the UI modules compile
      # out behind `#if canImport(...)` guards and only the pure logic modules
      # (models, networking, provider, discovery, auth) are tested. This keeps
      # the high-value logic under test on every push without a simulator.
      - name: Run unit tests
        run: swift test

  build:
    name: Build tvOS app
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Run complete tvOS test matrix
        run: tools/run-tests.sh

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build (tvOS Simulator)
        run: |
          set -o pipefail
          xcodebuild build \
            -project Plozz.xcodeproj \
            -scheme Plozz \
            -destination 'generic/platform=tvOS Simulator' \
            CODE_SIGNING_ALLOWED=NO
