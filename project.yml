name: Plozz
options:
  bundleIdPrefix: com.thatcube
  deploymentTarget:
    tvOS: "17.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    DEVELOPMENT_TEAM: N8Z5T4AK3X
    CODE_SIGN_STYLE: Automatic
    TARGETED_DEVICE_FAMILY: "3" # Apple TV
    SWIFT_STRICT_CONCURRENCY: complete
    # Build number (CFBundleVersion). The fastlane `build` lane overrides this
    # project-wide with (latest TestFlight build + 1) at archive time, which
    # keeps the app and the Top Shelf extension in lockstep; this default keeps
    # plain xcodebuild / local device installs working.
    CURRENT_PROJECT_VERSION: 1

# Local Swift package providing all modular feature/code libraries.
packages:
  Plozz:
    path: .

targets:
  Plozz:
    type: application
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: App/Plozz
      - path: App/Resources/Assets.xcassets
    info:
      path: App/Resources/Info.plist
      properties:
        # Marketing version (CFBundleShortVersionString) stays manual; bump by
        # hand for a release.
        CFBundleShortVersionString: "0.1"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        # Background audio keeps music playing while the user browses other
        # screens or the tvOS screensaver starts. Required for the music MVP's
        # background/Now-Playing behaviour (AVAudioSession .playback).
        UIBackgroundModes:
          - audio
        # OMDb API key for external ratings enrichment (IMDb/RT/Metacritic).
        # Substituted from the OMDB_API_KEY build setting (see Config/Secrets.xcconfig
        # → optional, gitignored Config/Secrets.local.xcconfig). Empty by default,
        # which disables OMDb enrichment and shows only Jellyfin-native ratings.
        OMDBAPIKey: "$(OMDB_API_KEY)"
        # TMDb API Read Access Token (v4 bearer). Powers the canonical-poster
        # fallback for items whose provider artwork is missing or junk. Substituted
        # from the TMDB_BEARER_TOKEN build setting (gitignored Config/Secrets.local.xcconfig).
        # Empty by default, which disables the TMDb fallback.
        TMDBBearerToken: "$(TMDB_BEARER_TOKEN)"
        # Local network access is required for LAN server discovery on tvOS.
        NSLocalNetworkUsageDescription: "Plozz uses your local network to discover Jellyfin servers automatically."
        NSBonjourServices:
          - _jellyfin._tcp
        # Jellyfin servers are user-controlled and frequently plain HTTP — on the
        # LAN, behind a reverse proxy, or over Tailscale (the 100.64.0.0/10 CGNAT
        # range, which is NOT covered by NSAllowsLocalNetworking). Since the user
        # explicitly enters their own server address, allow arbitrary HTTP loads
        # so Tailscale IPs (http://100.x.x.x:8096) and MagicDNS names resolve.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
          NSAllowsLocalNetworking: true
        # Deep links that launch the app straight into playback, used by the
        # Top Shelf extension's cards (e.g. plozz://item/<id>).
        CFBundleURLTypes:
          - CFBundleURLName: com.thatcube.Plozz.deeplink
            CFBundleURLSchemes:
              - plozz
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Plozz
        PRODUCT_NAME: Plozz
        # Default (empty) OMDb API key so plain builds work with external-ratings
        # enrichment disabled. A real key is supplied via the gitignored
        # Config/Secrets.local.xcconfig (see Config/Secrets.xcconfig).
        OMDB_API_KEY: ""
        # tvOS "Brand Assets" providing the layered app icon and Top Shelf
        # images (required by App Store Connect for any upload, incl. TestFlight).
        ASSETCATALOG_COMPILER_APPICON_NAME: "App Icon & Top Shelf Image"
        # App Group entitlement shared with the Top Shelf extension so both can
        # exchange the published snapshot.
        CODE_SIGN_ENTITLEMENTS: App/Resources/Plozz.entitlements
        GENERATE_INFOPLIST_FILE: NO
        # Force-keep the AVKit load command. AVKit is only used via the dynamic
        # `UIWindow.avDisplayManager` ObjC category (for the Dolby Vision / HDR
        # display-mode switch), so the linker's default `-dead_strip_dylibs`
        # otherwise drops it and the selector is unrecognized at runtime (crash).
        OTHER_LDFLAGS: "-Wl,-needed_framework,AVKit"
    configFiles:
      Debug: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
      Release: Config/Secrets.xcconfig
    dependencies:
      - package: Plozz
        product: AppShell
      - target: PlozzTopShelf
        embed: true

  PlozzTopShelf:
    type: com.apple.product-type.tv-app-extension
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: TopShelf/ContentProvider.swift
      # The snapshot model + store are compiled into the extension directly so
      # it stays free of CoreModels and the rest of the app's stack.
      - path: Sources/TopShelfKit/TopShelfSnapshot.swift
      - path: Sources/TopShelfKit/TopShelfStore.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Plozz.TopShelf
        PRODUCT_NAME: PlozzTopShelf
        INFOPLIST_FILE: TopShelf/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_ENTITLEMENTS: TopShelf/TopShelf.entitlements
        # tvOS's legacy TVExtensionMain entry point (set by the
        # com.apple.product-type.tv-app-extension product type) is a no-op stub
        # in modern tvOS — it returns immediately without instantiating the
        # principal class, leaving the Top Shelf empty. Modern Top Shelf
        # extensions must enter through NSExtensionMain (provided by
        # Foundation), which sets up the ExtensionKit/XPC runtime and
        # instantiates ContentProvider.
        LD_ENTRY_POINT: _NSExtensionMain

  # COMPILE/LINK gate target. This tvOS framework links the EngineMPV package
  # product on its own so CI / the build gate can prove it compiles + links
  # against the tvOS SDK with its libmpv + FFmpeg xcframeworks, independent of
  # the full app. (EngineMPV is also linked into the Plozz app itself as the sole
  # on-device decode engine; VLCKit was removed — see tag archive/vlckit-engine.)
  # Build via the EngineMPVProbe scheme.
  EngineMPVProbe:
    type: framework
    platform: tvOS
    deploymentTarget: "17.0"
    sources:
      - path: App/EngineMPVProbe
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.thatcube.Plozz.EngineMPVProbe
        PRODUCT_NAME: EngineMPVProbe
        GENERATE_INFOPLIST_FILE: YES
        # Probe-only; never shipped, so skip code signing entirely.
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - package: Plozz
        product: EngineMPV

schemes:
  Plozz:
    build:
      targets:
        Plozz: all
    run:
      config: Debug
    test:
      config: Debug
      # Unit tests live in the Swift package; run them via the package scheme
      # (`swift test` / `xcodebuild test -scheme Plozz-Package`).

  # Compile-only gate for the otherwise-unlinked EngineMPV module.
  EngineMPVProbe:
    build:
      targets:
        EngineMPVProbe: all
    run:
      config: Debug
